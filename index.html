<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios de GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Usuarios de GitHub</h1>
        <div class="search-container">
            <input type="text" id="search" placeholder="¿Qué usuario de GitHub estás buscando?">
        </div>
        <div id="results"></div>
    </div>
    <button id="toggle-theme">Cambiar Tema</button>

    <script>
        // Variables para el input de búsqueda, el div de resultados y el botón de cambio de tema
        const searchInput = document.getElementById('search');
        const resultsDiv = document.getElementById('results');
        const toggleThemeBtn = document.getElementById('toggle-theme');
        let timeout;

        function setTheme(isDark) {
            document.body.classList.toggle('dark-mode', isDark);
            localStorage.setItem('darkMode', isDark);
        }

        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
        const storedTheme = localStorage.getItem('darkMode');

        if (storedTheme !== null) {
            setTheme(storedTheme === 'true');
        } else {
            setTheme(prefersDarkScheme.matches); //si el usuario tiene un tema oscuro preferido, se establece el tema oscuro
        }

        prefersDarkScheme.addListener((e) => {
            setTheme(e.matches);
        });

        toggleThemeBtn.addEventListener('click', () => {
            setTheme(!document.body.classList.contains('dark-mode'));
        });
//Aqui esta el input de la busqueda de los usuarios de github, se hace una peticion a la api de github y se muestran los resultados en el div de resultados
        searchInput.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                const username = searchInput.value;
                if (username) {
                    fetch(`https://api.github.com/search/users?q=${username}&per_page=3`)//enlace a la api de github para buscar usuarios, se limita a 3 resultados por pagina
                        .then(response => response.json())
                        .then(data => {
                            resultsDiv.innerHTML = '';
                            const promises = data.items.map(user => 
                                fetch(user.url).then(response => response.json())
                            ); //se hace una promesa para cada usuario encontrado, para obtener mas informacion de cada uno
                            Promise.all(promises).then(usersData => {
                                usersData.forEach(userData => {
                                    const userDiv = document.createElement('div');
                                    userDiv.className = 'user'; //se crea un div para cada usuario encontrado
                                    userDiv.innerHTML = `
                                        <img src="${userData.avatar_url}" alt="${userData.login}">  <!--se muestra la imagen del usuario-->
                                        <h2>${userData.name || userData.login}</h2> <!--se muestra el nombre del usuario, si no tiene nombre se muestra el login-->
                                        <p>@${userData.login}</p> <!--se muestra el login del usuario-->
                                        <p>Empresa: ${userData.company || 'no esta afiliado'}</p> <!--se muestra la empresa del usuario, si no tiene empresa se muestra "no esta afiliado"-->
                                        <p>Repositorios: ${userData.public_repos}</p> <!--se muestra la informacion de los repositorios del usuario-->
                                        <a href="${userData.html_url}" target="_blank">Ver perfil de usuario</a>
                                    `;
                                    resultsDiv.appendChild(userDiv); //se agrega el div del usuario al div de resultados
                                });
                            });
                        });
                }
            }, 300);
        });
    </script>
</body>
</html>
