<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios de GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Buscador GitHub</h1>
        <button id="toggle-theme">Cambiar Tema</button>
    </header>

    <main>
        <section class="search-container">
            <input type="text" id="search" placeholder="¿Qué usuario de GitHub estás buscando?" autocomplete="off">
        </section>
        
        <!-- Contenedor de resultados -->
        <section id="results"></section>
    </main>

    <script>
        // Variables para el Input de Búsqueda, el div de Resultados y el Botón de Cambio de Tema
        const searchInput = document.getElementById('search');
        const resultsDiv = document.getElementById('results');
        const toggleThemeBtn = document.getElementById('toggle-theme');
        let timeout;

        // --- Lógica de Tema ---
        function setTheme(isDark) {
            document.body.classList.toggle('dark-mode', isDark);
            localStorage.setItem('darkMode', isDark);
        }

        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
        const storedTheme = localStorage.getItem('darkMode');

        if (storedTheme !== null) {
            setTheme(storedTheme === 'true');
        } else {
            setTheme(prefersDarkScheme.matches); //Si el usuario tiene un tema oscuro preferido, se establece el tema oscuro
        }

        prefersDarkScheme.addEventListener('change', (e) => {
            setTheme(e.matches);
        });

        toggleThemeBtn.addEventListener('click', () => {
            setTheme(!document.body.classList.contains('dark-mode'));
        });

        // --- Lógica de Búsqueda ---
        // Se hace una peticion a la api de GitHub y se muestran los resultados en el div de resultados
        searchInput.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                const username = searchInput.value.trim();                
                // Validación para limpiar pantalla si el input está vacío
                if (!username) {
                    resultsDiv.innerHTML = '';
                    return;
                }

                resultsDiv.innerHTML = '<p style="text-align:center;">Buscando...</p>';

                fetch(`https://api.github.com/search/users?q=${username}&per_page=3`) // Enlace a la api de GitHub para buscar usuarios, se limita a 3 resultados por página
                    .then(response => {
                        if (!response.ok) throw new Error("Límite de API alcanzado o error de red.");
                        return response.json();
                    })
                    .then(data => {
                        resultsDiv.innerHTML = '';
                        
                        if (data.items.length === 0) {
                            resultsDiv.innerHTML = '<p style="text-align:center;">No se encontraron usuarios.</p>';
                            return;
                        }

                        const promises = data.items.map(user => 
                            fetch(user.url).then(response => response.json())
                        ); // Se hace una promesa para cada usuario encontrado, para obtener mas informacion de cada uno
                        
                        Promise.all(promises).then(usersData => {
                            usersData.forEach(userData => {
                                // Se usa la etiqueta <article> para cada tarjeta de usuario
                                const userArticle = document.createElement('article');
                                userArticle.className = 'user';
                                userArticle.innerHTML = `
                                    <img src="${userData.avatar_url}" alt="Foto de ${userData.login}">
                                    <h2>${userData.name || userData.login}</h2> 
                                    <p>@${userData.login}</p> 
                                    <p><strong>Empresa:</strong> ${userData.company || 'No está afiliado'}</p> 
                                    <p><strong>Repositorios:</strong> ${userData.public_repos}</p> 
                                    <a href="${userData.html_url}" target="_blank">Ver perfil</a>
                                `;
                                resultsDiv.appendChild(userArticle); 
                            });
                        }).catch(error => {
                            console.error(error);
                            resultsDiv.innerHTML = '<p class="error-msg">Error al cargar los detalles de los usuarios.</p>';
                        });
                    })
                    .catch(error => {
                        console.error(error);
                        resultsDiv.innerHTML = `<p class="error-msg">${error.message}</p>`;
                    });
            }, 500);
        });
    </script>
</body>
</html>
